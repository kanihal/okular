<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<!--
    Font configuration for the Okular macOS app bundle.

    The fontconfig library bundled by Craft has its default config path baked
    in from the build machine, so it cannot find any configuration at runtime.
    Without the conf.d substitution rules, non-embedded PDF fonts get matched
    against unusable fonts (e.g. CFF-flavored .ttc collections) and render as
    .notdef boxes. Okular points FONTCONFIG_PATH at this directory on startup
    (see shell/main.cpp).
-->
<fontconfig>
    <description>Okular macOS bundle font configuration</description>

    <!-- macOS system font locations -->
    <dir>/System/Library/Fonts</dir>
    <dir>/Library/Fonts</dir>
    <dir>~/Library/Fonts</dir>
    <dir>/System/Library/Assets/com_apple_MobileAsset_Font3</dir>
    <dir>/System/Library/Assets/com_apple_MobileAsset_Font4</dir>
    <!-- Apple's document-compatibility fonts: includes Carlito/Century
         Gothic/Book Antiqua etc., metric-compatible with common Microsoft
         fonts (Calibri, ...). Without these, substituted glyph widths do
         not match the PDF's text positioning and spacing looks broken. -->
    <dir>/System/Library/PrivateFrameworks/FontServices.framework/Versions/A/Resources/Fonts/ApplicationSupport</dir>
    <dir prefix="xdg">fonts</dir>

    <!-- URW base-35 fonts, if bundled at Contents/Resources/fonts -->
    <dir prefix="relative">../../fonts</dir>

    <cachedir prefix="xdg">fontconfig</cachedir>

    <!-- Relative includes resolve against FONTCONFIG_PATH -->
    <include ignore_missing="yes">conf.d</include>
</fontconfig>
